version: "3.8"

services:
  site-app:
    image: ghcr.io/jogasolucoesempresarias-debug/sitejoga:latest
    networks:
      - proxy
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=proxy"
        # site institucional no domínio raiz (+ www)
        - "traefik.http.routers.sitejoga.rule=Host(`jogasolucoes.com.br`) || Host(`www.jogasolucoes.com.br`)"
        - "traefik.http.routers.sitejoga.entrypoints=websecure"
        - "traefik.http.routers.sitejoga.tls.certresolver=le"
        - "traefik.http.services.sitejoga.loadbalancer.server.port=80"
        # redireciona www -> domínio raiz
        - "traefik.http.routers.sitejoga.middlewares=sitejoga-www"
        - "traefik.http.middlewares.sitejoga-www.redirectregex.regex=^https://www\\.(.*)"
        - "traefik.http.middlewares.sitejoga-www.redirectregex.replacement=https://$${1}"
        - "traefik.http.middlewares.sitejoga-www.redirectregex.permanent=true"

networks:
  proxy:
    external: true
